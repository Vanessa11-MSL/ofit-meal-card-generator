<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cofit 外食餐盤圖卡生成器</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- html2canvas for exporting images -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f0fdf4; /* Light green background */
        }
        [contenteditable="true"] {
            transition: all 0.2s;
            border: 1px dashed transparent;
        }
        [contenteditable="true"]:hover {
            border-color: #86efac;
            background-color: #f0fdf4;
            border-radius: 4px;
        }
        [contenteditable="true"]:focus {
            outline: none;
            border-color: #065f46;
            background-color: #fff;
            box-shadow: 0 0 0 2px rgba(6, 95, 70, 0.2);
            border-radius: 4px;
        }
        .image-loading-skeleton {
            background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
            background-size: 200% 100%;
            animation: skeletonLoading 1.5s infinite;
        }
        @keyframes skeletonLoading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="text-gray-800">

    <!-- Toast Notification Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2"></div>

    <div class="max-w-6xl mx-auto p-6">
        <!-- Header -->
        <header class="mb-8 text-center">
            <h1 class="text-4xl font-black text-emerald-900 mb-2">Cofit 外食餐盤圖卡生成器</h1>
            <p class="text-emerald-700">自動讀取 14 天菜單，生成可編輯且包含 AI 生成餐點圖片的衛教圖卡</p>
        </header>

        <!-- Input Section -->
        <section class="bg-white rounded-2xl shadow-sm border border-emerald-100 p-6 mb-8">
            <h2 class="text-xl font-bold text-emerald-800 mb-4 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-file-spreadsheet"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h8"/><path d="M8 17h8"/><path d="M8 9h2"/></svg>
                輸入菜單資料 (CSV)
            </h2>
            
            <div class="mb-4">
                <label class="block text-sm font-medium text-gray-700 mb-1">貼上 CSV 文字</label>
                <textarea id="csv-input" rows="8" class="w-full border border-gray-300 rounded-lg p-3 focus:ring-2 focus:ring-emerald-700 focus:border-emerald-700 font-mono text-sm" placeholder="Day,早餐蛋白質,早餐全穀雜糧,早餐蔬菜,午餐蛋白質,午餐全穀雜糧,午餐蔬菜,晚餐蛋白質,晚餐全穀雜糧,晚餐蔬菜,每日重點&#10;Day 1,水煮蛋,地瓜,生菜沙拉,烤雞腿,糙米飯,燙青菜,清蒸魚,五穀飯,炒高麗菜,多喝水，保持充足睡眠！"></textarea>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="flex-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">或上傳 CSV 檔案</label>
                    <input type="file" id="csv-file" accept=".csv" class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-emerald-50 file:text-emerald-800 hover:file:bg-emerald-100 transition-colors">
                </div>
                <div class="flex-1 flex justify-end items-end h-full pt-6">
                    <button id="generate-btn" class="bg-emerald-800 hover:bg-emerald-900 text-white font-bold py-2 px-6 rounded-lg shadow-md transition-transform active:scale-95 flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        生成圖卡
                    </button>
                    <button id="load-sample-btn" class="ml-3 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-4 rounded-lg transition-colors">
                        載入範例
                    </button>
                </div>
            </div>
        </section>

        <!-- Cards Container -->
        <section id="cards-container" class="space-y-12 flex flex-col items-center">
            <!-- Cards will be generated here -->
            <div id="empty-state" class="text-center py-12 text-gray-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" class="mx-auto mb-4 opacity-50"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>
                <p class="text-lg">輸入資料後將自動生成健康餐盤圖卡</p>
            </div>
        </section>
    </div>

    <script>
        // --- 1. System & Global Variables ---
        const apiKey = ""; // Will be populated by execution environment
        const cardsContainer = document.getElementById('cards-container');
        const emptyState = document.getElementById('empty-state');
        let cardDataList = [];

        // --- 2. Utility Functions ---
        
        // Custom Toast Notification (replaces alert)
        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            
            let bgClass = 'bg-blue-600';
            if (type === 'error') bgClass = 'bg-red-500';
            if (type === 'success') bgClass = 'bg-emerald-700';
            if (type === 'warning') bgClass = 'bg-yellow-500';

            toast.className = `${bgClass} text-white px-6 py-3 rounded-lg shadow-lg flex items-center gap-3 transform transition-all duration-300 translate-x-full opacity-0`;
            toast.innerHTML = `
                <span class="font-medium">${message}</span>
                <button class="ml-auto text-white/80 hover:text-white" onclick="this.parentElement.remove()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            `;
            
            container.appendChild(toast);
            
            // Animate in
            requestAnimationFrame(() => {
                toast.classList.remove('translate-x-full', 'opacity-0');
            });

            // Auto remove
            setTimeout(() => {
                toast.classList.add('translate-x-full', 'opacity-0');
                setTimeout(() => toast.remove(), 300);
            }, 5000);
        }

        // Exponential backoff fetch wrapper
        async function fetchWithRetry(url, options, maxRetries = 5) {
            let retries = 0;
            let delay = 1000;
            while (retries < maxRetries) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return await response.json();
                    
                    // If rate limited or server error, throw to trigger retry
                    if (response.status === 429 || response.status >= 500) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    
                    // For other errors (like 400 Bad Request), return to handle gracefully
                    return await response.json(); 
                } catch (error) {
                    retries++;
                    console.warn(`Fetch attempt ${retries} failed. Retrying in ${delay}ms...`, error);
                    if (retries >= maxRetries) {
                        throw error;
                    }
                    await new Promise(res => setTimeout(res, delay));
                    delay *= 2;
                }
            }
        }

        // CSV Parser
        function parseCSV(csvText) {
            const lines = csvText.split('\n').filter(line => line.trim() !== '');
            if (lines.length < 2) return [];
            
            const headers = lines[0].split(',').map(h => h.trim());
            const data = [];
            
            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim());
                if (values.length >= 10) {
                    data.push({
                        day: values[0],
                        breakfast: { prot: values[1], grain: values[2], veg: values[3] },
                        lunch: { prot: values[4], grain: values[5], veg: values[6] },
                        dinner: { prot: values[7], grain: values[8], veg: values[9] },
                        dailyFocus: values[10] || '請盡量選擇原型食物，避免過度調味及油炸。多喝水，保持充足睡眠！'
                    });
                }
            }
            return data;
        }

        // --- 3. Core Logic ---

        // Image Generation Logic (Gemini API / Imagen)
        async function generateMealImage(protein, grain, veg) {
            const promptText = `蛋白質: ${protein}, 全穀雜糧: ${grain}, 蔬菜: ${veg}`;
            const enhancedPrompt = `A high-quality, commercial food photography shot of Hong Kong authentic style healthy takeout food or bento box. Clean, natural light, top-down or slight angle view. Meal components visible: ${promptText}. No text, no letters, no logos, no watermarks, no labels, no decorations. Clean white or neutral bright background. Professional nutrition presentation.`;

            if (!apiKey) {
                console.warn("API Key is missing. Returning placeholder.");
                return generatePlaceholderImage(promptText);
            }

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
                const payload = {
                    instances: { prompt: enhancedPrompt },
                    parameters: { sampleCount: 1 }
                };

                const result = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (result.predictions && result.predictions[0] && result.predictions[0].bytesBase64Encoded) {
                    return `data:image/png;base64,${result.predictions[0].bytesBase64Encoded}`;
                } else {
                    console.error("Image generation failed or returned unexpected structure", result);
                    return generatePlaceholderImage("生成失敗，點擊重新生成", true);
                }
            } catch (e) {
                console.error("Error generating image:", e);
                return generatePlaceholderImage("發生錯誤，點擊重新生成", true);
            }
        }

        // Fallback/Placeholder generator using Canvas
        function generatePlaceholderImage(text, isError = false) {
            const canvas = document.createElement('canvas');
            canvas.width = 400; canvas.height = 400;
            const ctx = canvas.getContext('2d');
            
            ctx.fillStyle = isError ? '#fee2e2' : '#f0fdf4';
            ctx.fillRect(0, 0, 400, 400);
            
            ctx.fillStyle = isError ? '#ef4444' : '#065f46';
            ctx.font = '20px Noto Sans TC, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // Wrap text slightly
            const words = text.split(', ');
            let y = 200 - ((words.length - 1) * 15);
            words.forEach(word => {
                ctx.fillText(word, 200, y);
                y += 30;
            });
            
            return canvas.toDataURL('image/png');
        }

        // Build a single card HTML
        function createCardElement(data, index) {
            const cardId = `card-${index}`;
            const card = document.createElement('div');
            card.id = cardId;
            card.className = 'w-full max-w-[1000px] bg-white rounded-3xl shadow-[0_8px_30px_rgb(0,0,0,0.08)] border border-emerald-50 overflow-hidden relative';
            
            // Format Day string (e.g., convert "1" to "Day 1")
            let displayDay = data.day.trim();
            if (/^\d+$/.test(displayDay)) {
                displayDay = `Day ${displayDay}`;
            } else if (/^day\s*\d+$/i.test(displayDay)) {
                displayDay = displayDay.replace(/^day\s*/i, 'Day ');
            }

            // Define meal blocks configuration
            const meals = [
                { type: 'breakfast', label: '早餐', data: data.breakfast, color: 'emerald' },
                { type: 'lunch', label: '午餐', data: data.lunch, color: 'teal' },
                { type: 'dinner', label: '晚餐', data: data.dinner, color: 'cyan' }
            ];

            let mealsHTML = meals.map(meal => {
                const textDesc = `蛋白質：${meal.data.prot}<br>全穀雜糧：${meal.data.grain}<br>蔬菜：${meal.data.veg}`;
                const imgId = `${cardId}-${meal.type}-img`;
                const btnId = `${cardId}-${meal.type}-regen`;
                
                return `
                    <div class="flex flex-col gap-4">
                        <div class="flex items-center justify-between border-b-2 border-${meal.color}-200 pb-2">
                            <h3 class="text-xl font-bold text-${meal.color}-800" contenteditable="true">${meal.label}</h3>
                            <span class="text-xs font-semibold bg-${meal.color}-100 text-${meal.color}-700 px-2 py-1 rounded-full" contenteditable="true">2:1:1 比例</span>
                        </div>
                        
                        <!-- Image Area -->
                        <div class="relative aspect-square w-full rounded-2xl overflow-hidden bg-gray-100 group shadow-inner">
                            <div id="${imgId}-skeleton" class="absolute inset-0 image-loading-skeleton"></div>
                            <img id="${imgId}" src="" class="absolute inset-0 w-full h-full object-cover opacity-0 transition-opacity duration-500" alt="${meal.label} Image">
                            
                            <!-- Regenerate Button (hidden on export) -->
                            <button id="${btnId}" class="no-export absolute bottom-3 right-3 bg-white/90 hover:bg-white text-gray-700 hover:text-${meal.color}-600 shadow-md p-2.5 rounded-full backdrop-blur-sm transition-all transform hover:scale-110 opacity-0 group-hover:opacity-100 focus:opacity-100 disabled:opacity-50 disabled:cursor-not-allowed" title="重新生成圖片">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                            </button>
                        </div>

                        <!-- Text Area -->
                        <div class="bg-${meal.color}-50/50 p-4 rounded-xl border border-${meal.color}-100 h-full">
                            <div class="text-gray-700 leading-relaxed min-h-[5rem]" contenteditable="true">${textDesc}</div>
                        </div>
                    </div>
                `;
            }).join('');

            card.innerHTML = `
                <!-- Export Menu (no-export) -->
                <div class="no-export absolute top-6 right-6 flex gap-2 z-10">
                    <button onclick="exportImage('${cardId}', 'png')" class="bg-white hover:bg-gray-50 text-gray-600 border border-gray-200 shadow-sm px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        PNG
                    </button>
                    <button onclick="exportImage('${cardId}', 'jpg')" class="bg-white hover:bg-gray-50 text-gray-600 border border-gray-200 shadow-sm px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center gap-2">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>
                        JPG
                    </button>
                </div>

                <div class="p-10 pt-12">
                    <!-- Card Header -->
                    <div class="text-center mb-10">
                        <div class="inline-block bg-emerald-800 text-white px-4 py-1.5 rounded-full text-sm font-bold mb-3 tracking-wider" contenteditable="true">COFIT 專家營養團隊</div>
                        <h2 class="text-4xl font-black text-gray-800 mb-2" contenteditable="true">${displayDay} 專屬外食餐盤</h2>
                        <p class="text-gray-500 font-medium" contenteditable="true">依照您的健康目標，精心設計的黃金比例</p>
                    </div>

                    <!-- Meals Grid -->
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-8">
                        ${mealsHTML}
                    </div>

                    <!-- Daily Focus Footer -->
                    <div class="bg-gray-50 border border-gray-100 rounded-2xl p-6 mt-8 flex gap-4 items-start">
                        <div class="bg-emerald-100 text-emerald-800 p-3 rounded-full flex-shrink-0">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                        </div>
                        <div class="flex-1">
                            <h4 class="text-lg font-bold text-gray-800 mb-1" contenteditable="true">每日重點提醒</h4>
                            <p class="text-gray-600" contenteditable="true">${data.dailyFocus}</p>
                        </div>
                    </div>
                </div>
            `;

            return { element: card, meals: meals, cardId: cardId };
        }

        // Trigger individual image generation
        async function triggerImageGeneration(imgId, skeletonId, btnId, mealData) {
            const imgEl = document.getElementById(imgId);
            const skelEl = document.getElementById(skeletonId);
            const btnEl = document.getElementById(btnId);

            // Set loading state
            imgEl.style.opacity = '0';
            skelEl.style.display = 'block';
            if(btnEl) btnEl.disabled = true;

            const base64Img = await generateMealImage(mealData.prot, mealData.grain, mealData.veg);
            
            // Render result
            if (base64Img) {
                imgEl.src = base64Img;
                imgEl.onload = () => {
                    imgEl.style.opacity = '1';
                    skelEl.style.display = 'none';
                };
            } else {
                skelEl.style.display = 'none'; // Fallback handled inside generateMealImage ideally
            }

            if(btnEl) btnEl.disabled = false;
        }

        // --- 4. Main Actions ---

        // Render Cards Flow
        async function generateCards() {
            const csvText = document.getElementById('csv-input').value;
            const parsedData = parseCSV(csvText);

            if (parsedData.length === 0) {
                showToast('無法解析 CSV 資料，請檢查格式是否正確。', 'error');
                return;
            }

            // Clear container
            cardsContainer.innerHTML = '';
            emptyState.style.display = 'none';
            cardDataList = parsedData;

            showToast(`成功讀取 ${parsedData.length} 天菜單，開始生成圖卡與圖片...`, 'success');

            // Construct DOM elements sequentially
            for (let i = 0; i < parsedData.length; i++) {
                const data = parsedData[i];
                const cardObj = createCardElement(data, i);
                cardsContainer.appendChild(cardObj.element);

                // Attach Event Listeners to Regenerate buttons and kick off initial generation
                cardObj.meals.forEach(meal => {
                    const imgId = `${cardObj.cardId}-${meal.type}-img`;
                    const skelId = `${cardObj.cardId}-${meal.type}-img-skeleton`;
                    const btnId = `${cardObj.cardId}-${meal.type}-regen`;
                    
                    const btn = document.getElementById(btnId);
                    if(btn) {
                        btn.addEventListener('click', () => {
                            showToast(`重新生成 ${data.day} ${meal.label} 圖片中...`, 'info');
                            triggerImageGeneration(imgId, skelId, btnId, meal.data);
                        });
                    }

                    // Kick off initial load (asynchronously, without blocking loop)
                    triggerImageGeneration(imgId, skelId, btnId, meal.data);
                });
            }
        }

        // Export Function (PNG/JPG) using html2canvas
        window.exportImage = function(cardId, format) {
            const card = document.getElementById(cardId);
            
            // Hide elements that shouldn't be exported
            const noExportElements = card.querySelectorAll('.no-export');
            noExportElements.forEach(el => el.style.opacity = '0'); // Use opacity instead of display to maintain layout strictly

            showToast(`正在匯出圖卡為 ${format.toUpperCase()}...`, 'info');

            // Slightly increase scale for better quality text
            html2canvas(card, { 
                scale: 2,
                useCORS: true,
                backgroundColor: '#ffffff'
            }).then(canvas => {
                const imgData = canvas.toDataURL(`image/${format === 'jpg' ? 'jpeg' : 'png'}`, 0.9);
                
                const link = document.createElement('a');
                link.download = `Cofit_MealPlate_${cardId}.${format}`;
                link.href = imgData;
                link.click();
                
                // Restore elements
                noExportElements.forEach(el => el.style.opacity = '1');
                showToast(`匯出成功！`, 'success');
            }).catch(err => {
                console.error('Export failed:', err);
                showToast('圖卡匯出失敗，請稍後再試。', 'error');
                noExportElements.forEach(el => el.style.opacity = '1');
            });
        };

        // --- 5. Event Listeners ---

        // File upload handler
        document.getElementById('csv-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('csv-input').value = e.target.result;
            };
            reader.readAsText(file);
        });

        // Generate button
        document.getElementById('generate-btn').addEventListener('click', generateCards);

        // Load sample button
        document.getElementById('load-sample-btn').addEventListener('click', () => {
            const sampleCSV = `Day,早餐蛋白質,早餐全穀雜糧,早餐蔬菜,午餐蛋白質,午餐全穀雜糧,午餐蔬菜,晚餐蛋白質,晚餐全穀雜糧,晚餐蔬菜,每日重點
Day 1,水煮蛋1顆,蒸地瓜半條,生菜沙拉1碗,烤去骨雞腿排,糙米飯半碗,燙青江菜1碗,清蒸鱸魚片,五穀飯半碗,炒高麗菜1碗,請盡量選擇原型食物，避免過度調味及油炸。多喝水，保持充足睡眠！
